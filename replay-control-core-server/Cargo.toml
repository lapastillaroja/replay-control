[package]
name = "replay-control-core-server"
version = "0.4.0-beta.4"
edition = "2024"
description = "Server-side (native) implementation for Replay Control: SQLite catalog, filesystem, HTTP, metadata ETL"
license.workspace = true
repository.workspace = true

[features]
default = []
library = ["dep:quick-xml"]
http = ["dep:reqwest", "dep:tokio-stream"]

[dependencies]
replay-control-core = { path = "../replay-control-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = "2"
crc32fast = "1"
semver = "1"
rusqlite = { version = "0.38", features = ["bundled"] }
deadpool-sqlite = { version = "0.13", features = ["rt_tokio_1"] }
deadpool = "0.13"
deadpool-sync = "0.2"
tokio = { workspace = true, features = ["fs", "sync", "macros", "rt-multi-thread", "process", "io-util"] }
tokio-stream = { version = "0.1", optional = true }
quick-xml = { version = "0.39", optional = true }
reqwest = { workspace = true, features = ["stream"], optional = true }
tempfile = "3"
getrandom = "0.4"

[[bin]]
name = "library_report"
required-features = ["library"]

[dev-dependencies]
mockito = "1"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
