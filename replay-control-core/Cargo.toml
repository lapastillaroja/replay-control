[package]
name = "replay-control-core"
version = "0.4.0-beta.2"
edition = "2024"
description = "Core library for Replay Control — game databases, ROM parsing, metadata, and settings"
license.workspace = true
repository.workspace = true

[features]
default = []
metadata = ["dep:rusqlite", "dep:quick-xml"]
http = ["dep:reqwest", "dep:tokio"]


[dependencies]
phf = "0.13"
serde = { workspace = true }
serde_json = { workspace = true }
url = "2"
thiserror = { workspace = true }
tracing = { workspace = true }
rusqlite = { version = "0.38", features = ["bundled"], optional = true }
quick-xml = { version = "0.39", optional = true }
reqwest = { workspace = true, optional = true }
tokio = { workspace = true, features = ["fs", "sync"], optional = true }
crc32fast = "1"
semver = "1"

[[bin]]
name = "metadata_report"
required-features = ["metadata"]

[dev-dependencies]
tempfile = "3"

[build-dependencies]
csv = "1"
phf_codegen = "0.13"
quick-xml = "0.39"
serde = { workspace = true }
serde_json = { workspace = true }
