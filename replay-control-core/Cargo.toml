[package]
name = "replay-control-core"
version = "0.1.0"
edition = "2024"

[features]
default = []
metadata = ["dep:rusqlite", "dep:quick-xml"]

[dependencies]
phf = "0.11"
serde = { workspace = true }
serde_json = { workspace = true }
url = "2"
thiserror = { workspace = true }
tracing = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
quick-xml = { version = "0.37", optional = true }
crc32fast = "1"

[[bin]]
name = "metadata_report"
required-features = ["metadata"]

[dev-dependencies]
tempfile = "3"

[build-dependencies]
csv = "1"
phf_codegen = "0.11"
quick-xml = "0.37"
serde = { workspace = true }
serde_json = { workspace = true }
