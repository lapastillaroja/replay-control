[workspace]
resolver = "2"
members = ["replay-control-core", "replay-control-app"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
incremental = true

# Fast release profile for development iteration.
# Use with: cargo build --profile release-dev
[profile.release-dev]
inherits = "release"
incremental = true
codegen-units = 256
opt-level = 1

[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = true
codegen-units = 1
incremental = false
