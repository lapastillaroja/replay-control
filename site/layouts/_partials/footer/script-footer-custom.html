<!-- Pagefind search modal -->
<div id="pagefind-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="pagefind-container">
    <div id="pagefind-ui"></div>
  </div>
</div>
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#pagefind-ui',
      bundlePath: '{{ "pagefind/" | relURL }}',
      showSubResults: true,
      showImages: false
    });
    // Open modal on search button click (reuse Doks button IDs if present, or our custom ones)
    document.querySelectorAll('.pagefind-trigger').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      });
    });
    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('pagefind-modal').classList.remove('active');
      }
    });
    // Open on Ctrl+K / Cmd+K
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }
    });
  });
</script>

<!-- Global image lightbox: click any img in .content to view fullscreen -->
<div id="img-lightbox" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.9); cursor:pointer; align-items:center; justify-content:center; flex-direction:column;" onclick="this.style.display='none'">
  <img id="img-lightbox-img" src="" alt="" style="max-width:90vw; max-height:90vh; border-radius:8px;" />
</div>
<script>
  document.querySelectorAll('.content img, .screenshot-thumb img').forEach(function(img) {
    if (img.closest('#img-lightbox')) return;
    img.style.cursor = 'pointer';
    img.addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('img-lightbox-img').src = this.src;
      document.getElementById('img-lightbox').style.display = 'flex';
    });
  });
</script>

<!-- Copy button on all code blocks (appears on hover) -->
<style>
  .highlight { position: relative; }
  .copy-code-btn {
    position: absolute; top: 0.3rem; right: 0.3rem;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #aaa; border-radius: 4px; padding: 0.15rem 0.4rem;
    font-size: 0.7rem; cursor: pointer; transition: all 0.2s;
    opacity: 0;
  }
  .highlight:hover .copy-code-btn { opacity: 1; }
  .copy-code-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .copy-code-btn.copied { opacity: 1; background: #198754; border-color: #198754; color: #fff; }
</style>
<script>
  document.querySelectorAll('.highlight').forEach(function(block) {
    var code = block.querySelector('code');
    if (!code) return;
    var btn = document.createElement('button');
    btn.className = 'copy-code-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(code.textContent.trim()).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
    block.appendChild(btn);
  });
</script>
