<!-- Pagefind search modal -->
<div id="pagefind-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="pagefind-container">
    <div id="pagefind-ui"></div>
  </div>
</div>
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#pagefind-ui',
      bundlePath: '{{ "pagefind/" | relURL }}',
      showSubResults: true,
      showImages: false
    });
    // Open modal on search button click (reuse Doks button IDs if present, or our custom ones)
    document.querySelectorAll('.pagefind-trigger').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      });
    });
    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('pagefind-modal').classList.remove('active');
      }
    });
    // Open on Ctrl+K / Cmd+K
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }
    });
  });
</script>

<!-- Global image lightbox: click any img in .content to view fullscreen -->
<div id="img-lightbox" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.9); cursor:pointer; align-items:center; justify-content:center; flex-direction:column;" onclick="this.style.display='none'">
  <img id="img-lightbox-img" src="" alt="" style="max-width:90vw; max-height:90vh; border-radius:8px;" />
</div>
<script>
  document.querySelectorAll('.content img, .screenshot-thumb img').forEach(function(img) {
    if (img.closest('#img-lightbox')) return;
    img.style.cursor = 'pointer';
    img.addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('img-lightbox-img').src = this.src;
      document.getElementById('img-lightbox').style.display = 'flex';
    });
  });
</script>

<!-- Code-block presentation: command-friendly dark blocks with a large copy button -->
<style>
  /* The `.chroma` element is the <pre>. Keep command blocks as one visible
     unit, but wrap long URLs so install commands are readable on phones. */
  .highlight {
    position: relative;
    margin: 1rem 0 1.25rem;
    max-width: 100%;
  }
  .highlight > pre.chroma {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0)),
      #0b1018;
    border: 1px solid rgba(139, 148, 158, 0.34);
    border-radius: 8px;
    box-shadow: 0 14px 38px rgba(0, 0, 0, 0.28);
    margin: 0;
    padding: 18px 122px 18px 18px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
    overflow-x: hidden;
    color: #c9d1d9;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 0.92rem;
    line-height: 1.55;
    -moz-tab-size: 4;
    tab-size: 4;
  }
  .highlight > pre.chroma code { background: transparent; padding: 0; }

  /* Hide theme-provided copy controls if one slips into a highlighted block. */
  .highlight .btn-clipboard,
  .highlight .clipboard,
  .highlight .copy,
  .highlight .copy-status {
    display: none !important;
  }

  /* Copy button — intentionally prominent like rustup.rs, with visible text. */
  .copy-code-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    min-width: 92px;
    height: 46px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #151b23;
    border: 1px solid rgba(139, 148, 158, 0.42);
    color: #c9d1d9;
    border-radius: 8px;
    cursor: pointer;
    padding: 0 14px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.12s;
    z-index: 1;
    font: 700 0.85rem/1.1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .copy-code-btn:hover {
    background: #212b36;
    border-color: #58a6ff;
    color: #fff;
    transform: translateY(-1px);
  }
  .copy-code-btn:focus-visible {
    outline: 2px solid #58a6ff;
    outline-offset: 2px;
  }
  .copy-code-btn svg { width: 23px; height: 23px; display: block; }
  .copy-code-label { display: inline-block; }
  .copy-code-btn.copied {
    background: #238636;
    border-color: #2ea043;
    color: #fff;
  }
  @media (max-width: 420px) {
    .highlight > pre.chroma {
      padding: 16px 108px 16px 14px;
      font-size: 0.86rem;
    }
    .copy-code-btn {
      min-width: 84px;
      height: 42px;
      gap: 6px;
      padding: 0 11px;
      font-size: 0.8rem;
    }
    .copy-code-btn svg { width: 21px; height: 21px; }
  }
</style>
<script>
  (function() {
    // Octicons-style copy + check glyphs (same icons GitHub uses).
    var ICON_COPY  = '<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
    var ICON_CHECK = '<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>';
    var label = function(text) {
      return '<span class="copy-code-label">' + text + '</span>';
    };

    document.querySelectorAll('.highlight').forEach(function(block) {
      if (block.querySelector('.copy-code-btn')) return;
      var code = block.querySelector('code');
      if (!code) return;

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-code-btn';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.setAttribute('title', 'Copy');
      btn.innerHTML = ICON_COPY + label('Copy');

      btn.addEventListener('click', function() {
        var text = code.textContent.replace(/\n$/, '');
        var done = function() {
          btn.innerHTML = ICON_CHECK + label('Copied');
          btn.classList.add('copied');
          btn.setAttribute('title', 'Copied');
          setTimeout(function() {
            btn.innerHTML = ICON_COPY + label('Copy');
            btn.classList.remove('copied');
            btn.setAttribute('title', 'Copy');
          }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done, function() {/* denied */});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch (e) {}
          document.body.removeChild(ta);
        }
      });

      block.appendChild(btn);
    });
  })();
</script>
