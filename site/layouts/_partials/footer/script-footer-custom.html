<!-- Pagefind search modal -->
<div id="pagefind-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="pagefind-container">
    <div id="pagefind-ui"></div>
  </div>
</div>
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#pagefind-ui',
      bundlePath: '{{ "pagefind/" | relURL }}',
      showSubResults: true,
      showImages: false
    });
    // Open modal on search button click (reuse Doks button IDs if present, or our custom ones)
    document.querySelectorAll('.pagefind-trigger').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      });
    });
    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('pagefind-modal').classList.remove('active');
      }
    });
    // Open on Ctrl+K / Cmd+K
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        var modal = document.getElementById('pagefind-modal');
        modal.classList.add('active');
        setTimeout(function() {
          var input = modal.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }
    });
  });
</script>

<!-- Global image lightbox: click any img in .content to view fullscreen -->
<div id="img-lightbox" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.9); cursor:pointer; align-items:center; justify-content:center; flex-direction:column;" onclick="this.style.display='none'">
  <img id="img-lightbox-img" src="" alt="" style="max-width:90vw; max-height:90vh; border-radius:8px;" />
</div>
<script>
  document.querySelectorAll('.content img, .screenshot-thumb img').forEach(function(img) {
    if (img.closest('#img-lightbox')) return;
    img.style.cursor = 'pointer';
    img.addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('img-lightbox-img').src = this.src;
      document.getElementById('img-lightbox').style.display = 'flex';
    });
  });
</script>
