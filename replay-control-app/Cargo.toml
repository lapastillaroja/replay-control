[package]
name = "replay-control-app"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "replay-control-app"
path = "src/main.rs"

[dependencies]
leptos = "0.7"
leptos_router = "0.7"
server_fn = "0.7"
serde = { workspace = true }
serde_json = { workspace = true }
urlencoding = "2"
wasm-bindgen = "0.2"

# SSR-only
replay-control-core = { path = "../replay-control-core", features = ["metadata"], optional = true }
axum = { version = "0.7", features = ["multipart"], optional = true }
leptos_axum = { version = "0.7", optional = true }
tower-http = { version = "0.6", features = ["fs", "cors", "compression-gzip"], optional = true }
tower = { version = "0.5", optional = true }
http = { version = "1", optional = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
clap = { version = "4", features = ["derive"], optional = true }
any_spawner = { version = "0.2", features = ["tokio"], optional = true }
notify = { version = "8", optional = true }
tokio-stream = { version = "0.1", optional = true }
rand = { version = "0.9", optional = true }
deadpool-sqlite = { version = "0.9", features = ["rt_tokio_1"], optional = true }
deadpool = { version = "0.12", optional = true }
deadpool-sync = { version = "0.1", optional = true }

# Hydrate-only
web-sys = { version = "0.3", features = [
    "HtmlInputElement",
    "HtmlTextAreaElement",
    "IntersectionObserver",
    "IntersectionObserverInit",
    "IntersectionObserverEntry",
    "EventSource",
    "MessageEvent",
    "Storage",
    "Document",
    "Element",
    "KeyboardEvent",
], optional = true }
gloo-timers = { version = "0.3", features = ["futures"], optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

[features]
default = []
hydrate = [
    "leptos/hydrate",
    "dep:web-sys",
    "dep:gloo-timers",
    "dep:console_error_panic_hook",
]
ssr = [
    "leptos/ssr",
    "server_fn/axum-no-default",
    "dep:replay-control-core",
    "dep:axum",
    "dep:leptos_axum",
    "dep:tower-http",
    "dep:tower",
    "dep:http",
    "dep:tokio",
    "dep:tracing",
    "dep:tracing-subscriber",
    "dep:clap",
    "dep:any_spawner",
    "dep:notify",
    "dep:tokio-stream",
    "dep:rand",
    "dep:deadpool-sqlite",
    "dep:deadpool",
    "dep:deadpool-sync",
]

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
