name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Quality & style checks ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      REPLAY_BUILD_STUB: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core)
        run: cargo clippy -p replay-control-core -- -D warnings

      - name: Clippy (app, SSR)
        run: cargo clippy -p replay-control-app --features ssr -- -D warnings

      - name: Clippy (app, hydrate)
        run: cargo clippy -p replay-control-app --target wasm32-unknown-unknown --features hydrate --no-default-features -- -D warnings

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.116

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build (x86_64)
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          retention-days: 1
          path: |
            target/release/replay-control-app
            target/site/

  # ── Unit tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      REPLAY_BUILD_STUB: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Generate CSS for integration tests
        run: |
          mkdir -p target/site
          cat replay-control-app/style/_*.css > target/site/style.css

      - name: Unit tests (core)
        run: cargo test -p replay-control-core

      - name: Unit tests (app)
        run: cargo test -p replay-control-app --features ssr

  # ── Unit tests against real upstream data ─────────────────────────
  # Runs the same tests as `test`, but without REPLAY_BUILD_STUB, so the
  # embedded PHF maps are built from the real (downloaded) source files.
  # This keeps the strict entry-count thresholds honest and catches
  # regressions that the stub build would silently swallow.
  #
  # Only runs on pushes to main and manual dispatch to avoid pulling ~180MB
  # of upstream data on every PR.
  test-full:
    name: Test (full data)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold p7zip-full

      - name: Cache upstream data sources
        uses: actions/cache@v4
        with:
          path: |
            data/catver.ini
            data/catver-mame-current.ini
            data/fbneo-arcade.dat
            data/mame2003plus.xml
            data/mame0285-arcade.xml
            data/nplayers.ini
            data/no-intro
            data/libretro-meta
            data/thegamesdb-latest.json
            data/wikidata
          key: upstream-data-${{ hashFiles('scripts/download-arcade-data.sh', 'scripts/download-metadata.sh', 'scripts/extract-mame-arcade.py', 'scripts/merge-catver.py', 'scripts/wikidata-series-extract.py') }}

      - name: Download arcade data
        run: ./scripts/download-arcade-data.sh

      - name: Download metadata
        run: ./scripts/download-metadata.sh

      - name: Extract Wikidata series
        run: |
          mkdir -p data/wikidata
          if [[ ! -s data/wikidata/series.json ]]; then
            python3 scripts/wikidata-series-extract.py > data/wikidata/series.json
          fi

      - name: Unit tests (core, full data)
        run: cargo test -p replay-control-core

  # ── Container E2E tests ────────────────────────────────────────────
  e2e:
    name: E2E
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: target/

      - name: Restore artifact permissions
        run: chmod +x target/release/replay-control-app

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright pytest
          playwright install chromium --with-deps

      - name: Run container tests
        run: SKIP_BUILD=1 CONTAINER_ENGINE=docker ./tests/container/run.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            tests/e2e/test-results/
            tests/e2e/*.xml
          retention-days: 7
