name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Quality & style checks ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Cache data files
        uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ hashFiles('scripts/download-arcade-data.sh', 'scripts/download-metadata.sh', 'scripts/wikidata-series-extract.py') }}
          restore-keys: data-

      - name: Download data files
        run: |
          bash scripts/download-arcade-data.sh
          bash scripts/download-metadata.sh
          mkdir -p data/wikidata
          python3 scripts/wikidata-series-extract.py > data/wikidata/series.json

      - name: Download TGDB lookup tables
        env:
          TGDB_API_KEY: ${{ secrets.TGDB_API_KEY }}
        run: ./scripts/download-tgdb-lookups.sh

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core)
        run: cargo clippy -p replay-control-core -- -D warnings

      - name: Clippy (app, SSR)
        run: cargo clippy -p replay-control-app --features ssr -- -D warnings

      - name: Clippy (app, hydrate)
        run: cargo clippy -p replay-control-app --target wasm32-unknown-unknown --features hydrate --no-default-features -- -D warnings

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.116

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build (x86_64)
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 1
          path: |
            target/release/replay-control-app
            target/site/

  # ── Unit tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache data files
        uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ hashFiles('scripts/download-arcade-data.sh', 'scripts/download-metadata.sh', 'scripts/wikidata-series-extract.py') }}
          restore-keys: data-

      - name: Download data files
        run: |
          bash scripts/download-arcade-data.sh
          bash scripts/download-metadata.sh
          mkdir -p data/wikidata
          python3 scripts/wikidata-series-extract.py > data/wikidata/series.json

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Generate CSS for integration tests
        run: |
          mkdir -p target/site
          cat replay-control-app/style/_*.css > target/site/style.css

      - name: Unit tests (core)
        run: cargo test -p replay-control-core

      - name: Unit tests (app)
        run: cargo test -p replay-control-app --features ssr

  # ── Container E2E tests ────────────────────────────────────────────
  e2e:
    name: E2E
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      - name: Restore artifact permissions
        run: chmod +x target/release/replay-control-app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright pytest
          playwright install chromium --with-deps

      - name: Run container tests
        run: SKIP_BUILD=1 CONTAINER_ENGINE=docker ./tests/container/run.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/e2e/test-results/
            tests/e2e/*.xml
          retention-days: 7
