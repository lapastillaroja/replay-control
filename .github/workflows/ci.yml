name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Quality & style checks ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (core)
        run: cargo clippy -p replay-control-core -- -D warnings

      - name: Clippy (core-server)
        run: cargo clippy -p replay-control-core-server --all-features -- -D warnings

      - name: Clippy (app, SSR)
        run: cargo clippy -p replay-control-app --features ssr -- -D warnings

      - name: Clippy (app, hydrate)
        run: cargo clippy -p replay-control-app --target wasm32-unknown-unknown --features hydrate --no-default-features -- -D warnings

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.125

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build (x86_64)
        # Builds the catalog from replay-control-core/fixtures/ (BUILD_CATALOG_STUB=1)
        # instead of downloading real data — this job validates that the build
        # pipeline itself works, not catalog coverage, so it doesn't need live
        # third-party hosts or a TGDB key. test-full.yml builds from real data
        # (on push + nightly) to catch upstream data drift.
        run: ./build.sh
        env:
          BUILD_CATALOG_STUB: "1"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          retention-days: 1
          path: |
            target/release/replay-control-app
            target/site/
            catalog.sqlite

  # ── Unit tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # The app crate's SSR test binary is large; compiling it with full debug
      # info peaks the runner's memory and gets the job OOM-killed (exit 143)
      # on a cold cache. Debug info isn't needed to run the tests, so drop it.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Generate CSS for integration tests
        run: |
          mkdir -p target/site
          cat replay-control-app/style/_*.css > target/site/style.css

      - name: Unit tests (core)
        run: cargo test -p replay-control-core

      - name: Unit tests (core-server)
        run: cargo test -p replay-control-core-server --all-features

      - name: Unit tests (app)
        run: cargo test -p replay-control-app --features ssr

  # ── Container E2E tests ────────────────────────────────────────────
  e2e:
    name: E2E
    needs: build
    runs-on: ubuntu-latest
    # Interim: raised 30 -> 45 to stop the suite being cancelled mid-run. This is
    # a band-aid — the real cost is per-test service restart + full library
    # rescan (seeded_game/seed_favorite -> reset_library + restart_app_and_scan,
    # up to ~120s each). Proper fix: cut per-test restarts and/or shard the job.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts

      - name: Restore artifact permissions
        run: chmod +x target/release/replay-control-app

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright pytest
          playwright install chromium --with-deps

      - name: Run container tests
        run: SKIP_BUILD=1 CONTAINER_ENGINE=docker ./tests/container/run.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            tests/e2e/test-results/
            tests/e2e/*.xml
          retention-days: 7
