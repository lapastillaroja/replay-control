name: Build Release

on:
  push:
    tags: ['v*']
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.3.0)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Cache data files
        uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ hashFiles('scripts/download-arcade-data.sh', 'scripts/download-metadata.sh', 'scripts/wikidata-series-extract.py') }}
          restore-keys: data-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            binaryen \
            mold \
            p7zip-full \
            unzip
          # Make mold discoverable by aarch64 cross-compiler
          sudo ln -sf /usr/bin/mold /usr/bin/aarch64-linux-gnu-ld.mold

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.116

      - name: Download TGDB lookup tables
        env:
          TGDB_API_KEY: ${{ secrets.TGDB_API_KEY }}
        run: ./scripts/download-tgdb-lookups.sh

      - name: Build (WASM + aarch64 server)
        run: ./build.sh aarch64

      - name: Package release archives
        run: |
          tar -czf replay-control-app-aarch64-linux.tar.gz \
              -C target/aarch64-unknown-linux-gnu/release \
              replay-control-app

          tar -czf replay-site.tar.gz \
              -C target \
              site

          sha256sum \
              replay-control-app-aarch64-linux.tar.gz \
              replay-site.tar.gz \
              install.sh \
              > checksums.sha256

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Create the release if it doesn't exist. Normally release-plz creates
          # it via workflow_call, but a human-pushed tag fires this workflow
          # directly (push: tags: ['v*']) with no release behind it — in that
          # case we self-heal instead of failing at upload.
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG not found — creating it."
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              --prerelease
          fi
          gh release upload "$TAG" \
            replay-control-app-aarch64-linux.tar.gz \
            replay-site.tar.gz \
            install.sh \
            checksums.sha256 \
            --clobber
