name: Container Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  container-e2e:
    name: Container E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache data files
        uses: actions/cache@v5
        with:
          path: data/
          key: data-${{ hashFiles('data/**') }}
          restore-keys: data-

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --locked

      - name: Download TGDB lookup tables
        env:
          TGDB_API_KEY: ${{ secrets.TGDB_API_KEY }}
        run: ./scripts/download-tgdb-lookups.sh

      - name: Build x86_64 binary + WASM + site
        run: ./build.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright pytest
          playwright install chromium --with-deps

      - name: Run container tests
        run: |
          CONTAINER_ENGINE=docker ./tests/container/run.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-test-results
          path: |
            tests/e2e/test-results/
            tests/e2e/*.xml
          retention-days: 7
