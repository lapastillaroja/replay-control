name: Test (full data)

# Runs the same unit tests as the `test` job in ci.yml, but with the
# catalog built from real (downloaded) source files. This keeps the strict
# entry-count thresholds honest and catches regressions the stub build
# would silently swallow.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly at 06:00 UTC — surfaces upstream-data drift (moved URLs,
    # schema changes, fixture-vs-reality skew) without waiting for a push.
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  test-full:
    name: Test (full data)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold p7zip-full

      - name: Restore upstream data cache
        # Restore-only from the shared data/upstream cache (produced weekly by
        # refresh-upstream-data.yml); the download steps below skip present
        # files and fetch fresh on a cold cache.
        uses: actions/cache/restore@v5
        with:
          path: |
            data/upstream/
          key: data-upstream-latest
          restore-keys: data-upstream-

      - name: Download arcade data
        run: ./scripts/download-arcade-data.sh

      - name: Download metadata
        run: ./scripts/download-metadata.sh

      - name: Download TGDB lookup tables
        env:
          TGDB_API_KEY: ${{ secrets.TGDB_API_KEY }}
        run: |
          if [[ ! -s data/upstream/tgdb-developers.json ]]; then
            ./scripts/download-tgdb-lookups.sh
          fi

      - name: Extract Wikidata series
        run: |
          mkdir -p data/wikidata
          if [[ ! -s data/wikidata/series.json ]]; then
            python3 scripts/wikidata-series-extract.py > data/wikidata/series.json
          fi

      - name: Build game catalog (full data)
        run: cargo run --release -p build-catalog -- --output catalog.sqlite

      - name: Unit tests (core, full data)
        run: cargo test -p replay-control-core
        env:
          REPLAY_CATALOG_PATH: catalog.sqlite
