name: Release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  # DISABLED: release-plz release-pr fails with cargo package on workspaces
  # with internal path dependencies in git_only mode.
  # Tracking: https://github.com/release-plz/release-plz/issues/2595
  # Fix PR: https://github.com/release-plz/release-plz/pull/2789
  # Re-enable once the fix is released.
  #
  # release-pr:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #       with:
  #         fetch-depth: 0
  #
  #     - uses: dtolnay/rust-toolchain@stable
  #
  #     - uses: release-plz/action@v0.5
  #       with:
  #         command: release-pr
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create git tag + GitHub Release when version is bumped manually.
  # Release-plz checks if the current version already has a tag — if so, no-op.
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.release-plz.outputs.releases_created && fromJSON(steps.release-plz.outputs.releases)[0].tag || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Chain the build workflow — tags created via GitHub API don't trigger push:tags events
  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
