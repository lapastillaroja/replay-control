name: Release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  # On every push to main: create/update a Release PR with changelog + version bump
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release-pr
          verbose: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug — re-run release-plz with full stderr
        if: always()
        run: |
          release-plz release-pr \
            --git-token "$GITHUB_TOKEN" \
            --verbose \
            -o json 2>&1 || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # When a release PR is merged (version bump committed): create git tag + GitHub Release
  release:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'chore(release)') || contains(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
